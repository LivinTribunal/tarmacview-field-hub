# single device-facing port for the BlueStacks emulator. pilot reaches the host
# only via 10.0.2.2:8080 - everything is funnelled here. bucket paths go to
# minio, everything else to the fieldhub api + connect page.

events {}

http {
    # kmz + media originals can be large - don't cap the body
    client_max_body_size 0;

    server {
        listen 8080;

        # object store - path-style addressing. preserve the signed Host
        # ($http_host) so presigned SigV4 urls (signed for 10.0.2.2:8080)
        # validate at minio. a rewritten Host breaks the signature.
        location ~ ^/(tarmacview-waylines|tarmacview-media)/ {
            proxy_pass http://minio:9000;
            proxy_set_header Host $http_host;
            proxy_buffering off;
        }

        # everything else - the fieldhub cloud api + the pilot connect page
        location / {
            proxy_pass http://fieldhub:8000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
