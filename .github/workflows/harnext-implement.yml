name: harnext implement
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number to run this stage on'
        required: true
        type: string

jobs:
  claude:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'harnext:implement'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    concurrency:
      group: harnext-implement-${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # PAT_TOKEN so the agent's `git push` is authored by the user.
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name "Štefan Moravík"
          git config --global user.email "stevko.moravik@gmail.com"

      - name: Run Claude Code
        id: claude
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # PAT_TOKEN so the agent's `git push` carries the `workflow` OAuth
          # scope - GITHUB_TOKEN cannot push changes under .github/workflows/**.
          github_token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          prompt: |
            You are the implement stage. Read the issue and the latest plan comment first (`gh issue view <num> --comments`).

            Workflow:
            1. `git checkout -b issue/<num>-<slug>` from `main`.
            2. Read `docs/specs/FIELD-HUB.md` and `docs/specs/dji-cloud-api-reference.md` if the issue touches the hub protocol or flows. Read existing code before editing — match conventions.
            3. Implement under `fieldhub/app/...`. Rules:
               - Routes (`fieldhub/app/api/routes/`) are HTTP-only; logic lives on model methods or services.
               - Routes never import models directly.
               - Every Python function/class gets a one-line lowercase docstring.
               - Pydantic v2 DTOs; device-facing responses follow the envelope shapes in `docs/specs/dji-cloud-api-reference.md`.
               - SQLAlchemy device registry persists in its own `fieldhub` postgres schema; tests use sqlite via `FIELDHUB_DATABASE_URL=sqlite://`.
               - Pytest: async tests use `asyncio_mode = "auto"` (configured in `fieldhub/pyproject.toml`).
               - Comments: sparse, lowercase, no thesis references.
               - Do NOT modify protected files: `.github/workflows/**`, `harness.config.json`, `fieldhub/requirements.txt`.
            4. Add/update tests under `fieldhub/tests/test_*.py` (pytest). T3 paths (`fieldhub/app/core/security*`, `fieldhub/app/services/storage_service*`, `fieldhub/app/services/*media*`) need extra coverage.
            5. No DB migrations — the hub creates its own schema/tables on startup; do not add alembic.
            6. Run locally before pushing:
               - `cd fieldhub && ruff check . && ruff format --check . && pytest`
            7. Git identity is set at the workflow level (Štefan Moravík) — do NOT run `git config user.name/user.email` yourself. Use conventional commit prefixes (`feat:`, `fix:`, `chore:`, `refactor:`, `docs:`, `test:`, `build:`, `ci:`); messages stay short, lowercase, casual.
            8. **Do NOT call `gh pr create`** — the workflow opens the PR in a follow-up step using the user's PAT so the PR is authored by Štefan, not the bot. Instead, push the branch and write the PR title and body to disk:
               ```
               git push -u origin issue/<num>-<slug>
               mkdir -p /tmp/harnext-pr-meta
               echo "<type>: <short>" > /tmp/harnext-pr-meta/title.txt
               echo "issue/<num>-<slug>" > /tmp/harnext-pr-meta/branch.txt
               cat > /tmp/harnext-pr-meta/body.md <<'EOF'
               Closes #<num>

               ## Summary
               ...

               ## Risk tier
               T1|T2|T3

               ## Test plan
               - [ ] ...
               EOF
               ```

            9. Do not merge. Stop after pushing the branch and writing the meta files.

            The issue or PR number for this run is: ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
          claude_args: '--model claude-opus-4-8 --effort xhigh --max-turns 500 --allowedTools "Read,Glob,Grep,Bash,Edit,Write"'
          allowed_bots: 'github-actions'

      - name: Open PR (as user, via PAT)
        id: open_pr
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          NUM: ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # only opens a PR when the run started from an issue (not a PR)
          IS_PR=$(gh api "repos/$REPO/issues/$NUM" --jq '.pull_request != null')
          if [ "$IS_PR" = "true" ]; then
            echo "ran on existing PR — skipping PR creation"
            exit 0
          fi
          if [ ! -f /tmp/harnext-pr-meta/title.txt ] \
             || [ ! -f /tmp/harnext-pr-meta/body.md ] \
             || [ ! -f /tmp/harnext-pr-meta/branch.txt ]; then
            echo "agent did not write PR meta — nothing to PR"
            echo "pr_num=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH="$(cat /tmp/harnext-pr-meta/branch.txt)"
          if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "branch $BRANCH not pushed — nothing to PR"
            echo "pr_num=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_URL=$(gh pr create --draft --base main --head "$BRANCH" \
            --title "$(cat /tmp/harnext-pr-meta/title.txt)" \
            --body-file /tmp/harnext-pr-meta/body.md)
          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "opened PR #$PR_NUM as user"

      - name: Transition labels on success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUM: ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
          PR_NUM: ${{ steps.open_pr.outputs.pr_num }}
        run: |
          set -euo pipefail
          IS_PR=$(gh api repos/${{ github.repository }}/issues/$NUM --jq '.pull_request != null')

          if [ "$IS_PR" = "true" ]; then
            # ran directly on a PR — chain into gap on the same PR
            gh api -X DELETE repos/${{ github.repository }}/issues/$NUM/labels/harnext:implement || true
            gh label create harnext:gap --color ededed --description "harnext gap stage" 2>/dev/null || true
            gh api -X POST repos/${{ github.repository }}/issues/$NUM/labels -f labels[]=harnext:gap
            gh workflow run harnext-gap.yml --field issue_number=$NUM || true
          elif [ -n "$PR_NUM" ]; then
            # ran on an issue and the agent opened a PR — hand off
            gh api -X DELETE repos/${{ github.repository }}/issues/$NUM/labels/harnext:implement || true
            gh label create harnext:awaiting-approval --color ededed --description "awaiting human approval" 2>/dev/null || true
            gh api -X POST repos/${{ github.repository }}/issues/$NUM/labels -f labels[]=harnext:awaiting-approval || true

            gh label create harnext:gap --color ededed --description "harnext gap stage" 2>/dev/null || true
            gh api -X POST repos/${{ github.repository }}/issues/$PR_NUM/labels -f labels[]=harnext:gap
            gh workflow run harnext-gap.yml --field issue_number=$PR_NUM || true
          else
            # ran on an issue and no PR was found — leave for human triage
            gh api -X DELETE repos/${{ github.repository }}/issues/$NUM/labels/harnext:implement || true
            gh label create harnext:needs-judgment --color b60205 --description "needs human judgment" 2>/dev/null || true
            gh api -X POST repos/${{ github.repository }}/issues/$NUM/labels -f labels[]=harnext:needs-judgment
          fi

      - name: Park on needs-judgment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUM: ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
        run: |
          gh api -X DELETE repos/${{ github.repository }}/issues/$NUM/labels/harnext:implement || true
          gh label create harnext:needs-judgment --color b60205 --description "needs human judgment" 2>/dev/null || true
          gh api -X POST repos/${{ github.repository }}/issues/$NUM/labels -f labels[]=harnext:needs-judgment
