name: Harnext Gap Bridge
# Bridge phase of the gap loop. Reads the most recent gap-agent verdict
# comment, addresses every criterion marked `missing`, pushes to the PR
# branch, then re-dispatches the gap evaluator. Dispatch-only — never
# fires from a labeled event.
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'PR number to run the gap-bridge stage on'
        required: true
        type: string

jobs:
  claude:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    concurrency:
      group: harnext-gap-bridge-${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # PAT_TOKEN so the agent's `git push` carries the `workflow` OAuth
          # scope and is authored by the user, matching review-fix.
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name "Štefan Moravík"
          git config --global user.email "stevko.moravik@gmail.com"

      - name: Run Claude Code
        id: claude
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          prompt: |
            You are the gap-bridge agent. The most recent gap-evaluation on PR ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }} reported gaps that need to be fixed.

            1. `gh pr checkout ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}` and `git pull`.
            2. Read the most recent gap-agent comment: `gh api repos/:owner/:repo/issues/${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}/comments --jq '[.[] | select(.body | contains("<!-- harness-review: gap-agent -->"))] | last | .body'`. Verdict will be `GAPS_NEEDS_FIX`. Each bullet in the body is one missing criterion in the shape `- <criterion> — <path:line> — <fix>`. Treat that bullet list as your full task list and address every item.
            3. Edit only what the gap report demands. Do not refactor, rename, or add unrelated changes. Do not modify protected files (`.github/workflows/**`, `harness.config.json`, `backend/requirements.txt`, `frontend/package-lock.json`).
            4. Re-run gates locally before pushing:
               - `cd backend && ruff check . && ruff format --check . && pytest`
               - `cd frontend && npm run lint && npx tsc --noEmit && npx vitest run && npm run build`
            5. Git identity is set at the workflow level (Štefan Moravík) — do NOT run `git config user.name/user.email` yourself. Use conventional commit prefixes (`fix:`, `feat:`, `refactor:`, `test:`, etc.); keep messages short, lowercase, casual. One logical change per commit. Push to the same branch.
            6. Reply once on the PR (`gh pr comment ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}`) with a checklist mapping each addressed criterion → commit SHA. Do not edit prior comments.
          claude_args: '--model claude-opus-4-8 --effort xhigh --max-turns 500 --allowedTools "Read,Glob,Grep,Bash,Edit,Write"'
          allowed_bots: 'github-actions'

      - name: Re-dispatch gap on success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUM: ${{ github.event.pull_request.number || inputs.issue_number }}
        run: |
          gh workflow run "harnext-gap.yml" --field issue_number="$NUM"

      - name: Park on needs-judgment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUM: ${{ github.event.pull_request.number || inputs.issue_number }}
        run: |
          iter=$(gh api "repos/${{ github.repository }}/issues/$NUM/labels" --jq '.[].name' | \
                grep -oE '^harnext:gap-bridge-iter-[0-9]+$' | head -n1 || echo "")
          if [ -n "$iter" ]; then
            gh api -X DELETE "repos/${{ github.repository }}/issues/$NUM/labels/$iter" || true
          fi
          gh api -X DELETE "repos/${{ github.repository }}/issues/$NUM/labels/harnext:gap" || true
          gh api -X POST "repos/${{ github.repository }}/issues/$NUM/labels" -f labels[]="harnext:needs-judgment"
